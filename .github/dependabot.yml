version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    groups:
      # Group all non-major Go dependency bumps into a single PR.
      go-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      # Group all major Go dependency bumps separately so they get attention.
      go-major:
        patterns:
          - "*"
        update-types:
          - major

  # GitHub Actions (keeps the pinned SHAs up to date)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"
