name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    # pull-requests: write lets the coverage step post/update a PR comment.
    # The token is read-only on fork PRs, so that step is guarded to same-repo
    # PRs below; coverage still lands in the job summary either way.
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26.x"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go }}
      - run: make test
      - name: Coverage report (job summary)
        run: make cover-report | tee coverage-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment coverage on PR
        # Skip on fork PRs (read-only token) and on pushes to main.
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- coverage-report -->';
            const body = `${marker}\n${fs.readFileSync('coverage-report.md', 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            // Reuse the existing sticky comment (found by its hidden marker) so
            // each push updates one comment instead of stacking new ones.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              core.info(`Updated coverage comment on PR #${issue_number}`);
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
              core.info(`Created coverage comment on PR #${issue_number}`);
            }

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: make build

  vuln:
    name: Govulncheck
    runs-on: ubuntu-latest
    env:
      # Let go.mod's `toolchain` directive pull the patched Go for the scan,
      # so CI matches `make vuln` locally instead of a runner's base toolchain.
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: make vuln

  tidy:
    name: Tidy check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  modernize:
    name: Modernize check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Verify code uses modern Go (go fix)
        # `go fix -diff` applies the go1.26 modernizers in report-only mode and
        # exits non-zero if any fix would change a file. Run `make modernize`
        # locally to apply them.
        run: make modernize-check

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Lint workflows (actionlint + shellcheck)
        # Runs the same pinned actionlint as local development (`make
        # actionlint`); shellcheck is preinstalled on ubuntu-latest runners.
        # No write permissions needed (unlike check-annotation reporters).
        run: make actionlint
