name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    # pull-requests: write lets the coverage step post/update a PR comment.
    # The token is read-only on fork PRs, so that step is guarded to same-repo
    # PRs below; coverage still lands in the job summary either way.
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26.x"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
      - run: make test
      - name: Coverage report (job summary)
        run: make cover-report | tee coverage-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment coverage on PR
        # Skip on fork PRs (read-only token) and on pushes to main.
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          marker='<!-- coverage-report -->'
          body="$(printf '%s\n%s' "$marker" "$(cat coverage-report.md)")"
          api="https://api.github.com/repos/$REPO"
          auth="Authorization: Bearer $GH_TOKEN"
          accept="Accept: application/vnd.github+json"
          # Reuse the existing sticky comment (found by its hidden marker) so
          # each push updates one comment instead of stacking new ones.
          existing="$(curl -fsS -H "$auth" -H "$accept" \
            "$api/issues/$PR_NUMBER/comments?per_page=100" \
            | jq -r --arg m "$marker" 'map(select(.body | contains($m))) | .[0].id // empty')"
          payload="$(jq -n --arg body "$body" '{body: $body}')"
          if [ -n "$existing" ]; then
            curl -fsS -X PATCH -H "$auth" -H "$accept" \
              "$api/issues/comments/$existing" -d "$payload" >/dev/null
            echo "Updated coverage comment on PR #$PR_NUMBER"
          else
            curl -fsS -X POST -H "$auth" -H "$accept" \
              "$api/issues/$PR_NUMBER/comments" -d "$payload" >/dev/null
            echo "Created coverage comment on PR #$PR_NUMBER"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: make build

  vuln:
    name: Govulncheck
    runs-on: ubuntu-latest
    env:
      # Let go.mod's `toolchain` directive pull the patched Go for the scan,
      # so CI matches `make vuln` locally instead of a runner's base toolchain.
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: make vuln

  tidy:
    name: Tidy check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  modernize:
    name: Modernize check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Verify code uses modern Go (go fix)
        # `go fix -diff` applies the go1.26 modernizers in report-only mode and
        # exits non-zero if any fix would change a file. Run `make modernize`
        # locally to apply them.
        run: make modernize-check

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Lint workflows (actionlint + shellcheck)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-check
          fail_level: error
