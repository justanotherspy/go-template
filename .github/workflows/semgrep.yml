name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install Semgrep CE
        # Hash-pinned for supply-chain integrity; Dependabot (pip ecosystem)
        # keeps .github/requirements/semgrep.txt current.
        run: python -m pip install --require-hashes -r .github/requirements/semgrep.txt
      - name: Run Semgrep (SARIF)
        # Findings should not fail the build; they surface in code scanning.
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/golang \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output semgrep.sarif
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep.sarif
          category: semgrep
