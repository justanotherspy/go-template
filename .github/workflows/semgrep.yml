name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Install Semgrep CE
        run: python -m pip install --upgrade semgrep
      - name: Run Semgrep (SARIF)
        # Findings should not fail the build; they surface in code scanning.
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/golang \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output semgrep.sarif
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8c78abb9b62512e3c45dea6559ffd924ed8549c8 # v3.28.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep
