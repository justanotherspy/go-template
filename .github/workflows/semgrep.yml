name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
      - name: Install Semgrep CE
        # Hash-pinned for supply-chain integrity; Dependabot (pip ecosystem)
        # keeps .github/requirements/semgrep.txt current.
        run: python -m pip install --require-hashes -r .github/requirements/semgrep.txt
      - name: Run Semgrep (SARIF)
        # Findings should not fail the build; they surface in code scanning.
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/golang \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output semgrep.sarif
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
