name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Install Semgrep CE
        # Hash-pinned for supply-chain integrity; Dependabot (pip ecosystem)
        # keeps .github/requirements/semgrep.txt current.
        run: python -m pip install --require-hashes -r .github/requirements/semgrep.txt
      - name: Run Semgrep (SARIF)
        # Findings should not fail the build; they surface in code scanning.
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/golang \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output semgrep.sarif
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
