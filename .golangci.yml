# golangci-lint v2 configuration.
# Docs: https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  # Start from the curated "standard" set (errcheck, govet, ineffassign,
  # staticcheck, unused) and layer on extra linters.
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nolintlint
    - revive
    - unconvert
    - whitespace
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    misspell:
      locale: US
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      rules:
        - name: exported
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/justanotherspy/go-template
