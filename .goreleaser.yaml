# GoReleaser configuration.
# Docs: https://goreleaser.com
#
# This config is consumed by the `release.yml` workflow, which runs after a
# drafted release is published as a pre-release. GoReleaser builds the binaries
# and *appends* them to that existing release (it does not touch the release
# notes, which are generated by release-drafter). A later job promotes the
# release to "latest".
version: 2

project_name: go-template

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: go-template
    main: ./cmd/go-template
    binary: go-template
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

# Release notes are owned by release-drafter; GoReleaser only uploads binaries.
changelog:
  disable: true

release:
  mode: append
  draft: false
